# =============================================================================
# Nginx 反向代理配置 — 企业知识库问答系统
# =============================================================================
#
# 【架构角色】
# Nginx 作为统一入口，将请求分发到不同的后端服务：
#   /           → Vue 前端静态文件 (frontend/dist)
#   /api/       → Spring Boot 后端 API (:8080)
#   /ai-api/    → FastAPI AI 服务 (:8000)
#
# 【为什么需要反向代理】
# 1. 统一入口：前端、后端、AI 服务共用 80 端口，无跨域问题
# 2. 静态文件：Nginx 高效处理前端静态资源（比 Tomcat 快 10 倍）
# 3. 安全隔离：后端服务不直接暴露，Nginx 作为安全屏障
# 4. 负载均衡：后续多实例部署时可做 upstream 负载分担
#
# 💡 学习要点:
# - proxy_pass 指令：将请求转发到后端服务
# - proxy_set_header：传递客户端真实信息（IP、协议等）
# - try_files：前端 SPA 路由兜底（所有路径都返回 index.html）
# - gzip：压缩响应体，减少传输大小
# =============================================================================

# 最大工作进程数（auto = 自动匹配 CPU 核心数）
worker_processes auto;

events {
    # 单个 worker 进程的最大并发连接数
    worker_connections 1024;
}

http {
    # ---------------------------------------------------------------------------
    # 基础配置
    # ---------------------------------------------------------------------------
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # 日志格式：远程IP | 时间 | 请求方法+路径 | 状态码 | 响应大小 | 耗时
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # 高效传输模式（对静态文件特别有效）
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # 长连接超时（秒）
    keepalive_timeout 65;

    # ---------------------------------------------------------------------------
    # Gzip 压缩配置
    # ---------------------------------------------------------------------------
    # 压缩响应体，减少网络传输量。文本类资源通常可压缩 60-80%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml;

    # ---------------------------------------------------------------------------
    # 上游服务定义（负载均衡池）
    # ---------------------------------------------------------------------------
    # 后续扩容时只需在 upstream 中添加多个 server 即可实现负载均衡

    upstream backend_api {
        server backend:8080;
    }

    upstream ai_service {
        server ai-service:8000;
    }

    # ---------------------------------------------------------------------------
    # HTTP 服务器（端口 80）
    # ---------------------------------------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # 安全响应头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        # -----------------------------------------------------------------------
        # API 代理：/api/ → Spring Boot 后端
        # -----------------------------------------------------------------------
        # 所有 /api/ 开头的请求转发到 Spring Boot
        # Spring Boot 的 context-path 已经是 /api，所以直接透传
        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # 超时设置（AI 相关接口可能较慢，设置较长超时）
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;
        }

        # -----------------------------------------------------------------------
        # AI 服务代理：/ai-api/ → FastAPI
        # -----------------------------------------------------------------------
        # AI 服务的 API 前缀为 /ai-api/
        # 通过 rewrite 去掉前缀后转发给 FastAPI（FastAPI 自己不处理前缀）
        location /ai-api/ {
            rewrite ^/ai-api/(.*) /$1 break;
            proxy_pass http://ai_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # SSE（Server-Sent Events）支持：AI 流式输出需要
            proxy_buffering off;
            proxy_cache off;

            # AI 推理可能较慢，延长超时
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
            proxy_read_timeout 300s;
        }

        # -----------------------------------------------------------------------
        # Swagger UI 代理
        # -----------------------------------------------------------------------
        # Spring Boot 的 Swagger UI 路径（context-path 是 /api）
        location /swagger-ui/ {
            proxy_pass http://backend_api/api/swagger-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # OpenAPI JSON 端点
        location /v3/api-docs {
            proxy_pass http://backend_api/api/v3/api-docs;
            proxy_set_header Host $host;
        }

        # -----------------------------------------------------------------------
        # 前端静态文件（Vue SPA）
        # -----------------------------------------------------------------------
        # root 指向 Vue 构建产物的目录
        root /usr/share/nginx/html;
        index index.html;

        # 静态资源缓存（带 hash 的文件可长期缓存）
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # SPA 路由兜底：所有未匹配的路径都返回 index.html
        # 这样 Vue Router 的 History 模式才能正常工作
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
