spring:
  application:
    name: knowledge-base
  profiles:
    active: dev

  # 数据源配置 — 所有值通过环境变量注入
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_DATABASE}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Flyway 数据库迁移配置
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    validate-on-migrate: true

  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Elasticsearch 配置
  elasticsearch:
    uris: ${ES_HOST}:${ES_PORT}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: current timestamp
      logic-not-delete-value: null
  mapper-locations: classpath*:/mapper/**/*.xml

# JWT 配置
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

# AI 服务配置
ai:
  service:
    url: ${AI_SERVICE_URL}
    timeout: 30000

# 文件上传配置
file:
  upload:
    path: ${UPLOAD_PATH}
    max-size: ${UPLOAD_MAX_SIZE}
    allowed-types: ${UPLOAD_ALLOWED_TYPES}

# 服务器配置
server:
  port: ${SERVER_PORT}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/json,application/javascript

# 日志配置
logging:
  level:
    com.geekyous.kb: ${LOG_LEVEL}
    org.springframework.security: ${SECURITY_LOG_LEVEL}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n"
  file:
    name: logs/knowledge-base.log

# SpringDoc 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

# 管理端点配置
# Actuator 端点路径会受到 server.servlet.context-path 影响
# 实际路径为 /api/actuator/health
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Jasypt 配置文件加密
# 当环境变量值中包含 ENC() 密文时，需设置 JASYPT_ENCRYPTOR_PASSWORD 主密钥
# 若所有环境变量均为明文，则无需设置 JASYPT_ENCRYPTOR_PASSWORD
# 加密工具用法（在 backend 目录下执行）：
#   JAVA_HOME=$(/usr/libexec/java_home -v 17) mvn -q dependency:build-classpath -Dmdep.outputFile=/tmp/kb-cp.txt
#   $JAVA_HOME/bin/java -cp "$(cat /tmp/kb-cp.txt):target/classes" \
#     -Djasypt.encryptor.password=<你的主密钥> \
#     com.geekyous.kb.utils.JasyptEncryptUtil encrypt <要加密的明文>
jasypt:
  encryptor:
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# 初始用户密码配置（仅首次启动、用户表为空时使用）
app:
  init:
    admin-password: ${INIT_ADMIN_PASSWORD}
    editor-password: ${INIT_EDITOR_PASSWORD}
    user-password: ${INIT_USER_PASSWORD}
