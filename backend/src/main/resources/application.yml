# =============================================================================
# 企业知识库问答系统 — 统一配置
# =============================================================================
# 环境策略：${VAR:默认值}
#   IDEA — 走默认值（localhost + DEBUG），无需加载 .env
#   Docker — .env 覆盖（Docker 主机名 + INFO）
# =============================================================================

# ---------------------------------------------------------------------------
# 服务器
# ---------------------------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: text/html,text/xml,text/plain,text/css,application/json,application/javascript

# ---------------------------------------------------------------------------
# 数据层
# ---------------------------------------------------------------------------
spring:
  application:
    name: knowledge-base

  # MySQL
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_DATABASE:knowledge_base}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:kb_user}
    password: ${DB_PASSWORD:kb_password_2024}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA / Hibernate
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    encoding: UTF-8
    validate-on-migrate: true

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_password}
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Elasticsearch
  elasticsearch:
    uris: ${ES_HOST:http://127.0.0.1}:${ES_PORT:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: current timestamp
      logic-not-delete-value: null
  mapper-locations: classpath*:/mapper/**/*.xml

# ---------------------------------------------------------------------------
# 安全与加密
# ---------------------------------------------------------------------------
# Jasypt — 加密 email/phone 等隐私字段的 AttributeConverter
# 加密工具用法（在 backend 目录下执行）：
#   JAVA_HOME=$(/usr/libexec/java_home -v 17) mvn -q dependency:build-classpath -Dmdep.outputFile=/tmp/kb-cp.txt
#   $JAVA_HOME/bin/java -cp "$(cat /tmp/kb-cp.txt):target/classes" \
#     -Djasypt.encryptor.password=<主密钥> \
#     com.geekyous.kb.utils.JasyptEncryptUtil encrypt <明文>
jasypt:
  encryptor:
    password: ${JASYPT_ENCRYPTOR_PASSWORD:kb-jasypt-master-key-2026}
    algorithm: PBEWITHHMACSHA512ANDAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# JWT 认证
jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-do-not-use-in-production-abcdefg1234567}
  expiration: ${JWT_EXPIRATION:86400}

# ---------------------------------------------------------------------------
# 应用配置
# ---------------------------------------------------------------------------
app:
  # CORS 跨域
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
  # 初始用户（仅首次启动、用户表为空时创建）
  init:
    admin-password: ${INIT_ADMIN_PASSWORD:admin123}
    editor-password: ${INIT_EDITOR_PASSWORD:editor123}
    user-password: ${INIT_USER_PASSWORD:user123}

# AI 问答服务
ai:
  service:
    url: ${AI_SERVICE_URL:http://127.0.0.1:8000}
    timeout: 30000

# 文件上传
file:
  upload:
    path: ${UPLOAD_PATH:./uploads}
    max-size: ${UPLOAD_MAX_SIZE:50MB}
    allowed-types: ${UPLOAD_ALLOWED_TYPES:pdf,doc,docx,xlsx,ppt,pptx,txt,md}

# ---------------------------------------------------------------------------
# 开发与运维
# ---------------------------------------------------------------------------
# SpringDoc / Swagger UI（开发默认开启，生产通过 .env 关闭）
springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  show-actuator: true

# Actuator — 仅暴露 health（Docker 健康检查需要），info/metrics 按需开放
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when-authorized

# 日志级别（格式、轮转、traceId 在 logback-spring.xml 中配置）
logging:
  level:
    com.geekyous.kb: ${LOG_LEVEL:DEBUG}
    org.springframework.security: ${SECURITY_LOG_LEVEL:DEBUG}
